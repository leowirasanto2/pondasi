name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-contracts:
    name: PondasiContracts
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Pod install
        working-directory: Core/PondasiContracts
        run: pod install

      - name: Run tests
        working-directory: Core/PondasiContracts
        run: |
          xcodebuild test \
            -workspace PondasiContracts.xcworkspace \
            -scheme PondasiContracts \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults/PondasiContracts.xcresult \
            | xcpretty

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PondasiContracts-results
          path: Core/PondasiContracts/TestResults/

